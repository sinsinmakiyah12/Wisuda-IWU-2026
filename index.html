<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Wisuda IWU 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: radial-gradient(circle at top right, #1e0b4d, #0d0421); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: white; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        .glass-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin-bottom: 20px; }
        
        /* Menu Utama & Grid */
        .menu-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .menu-card:hover { background: rgba(255, 255, 255, 0.12); transform: translateY(-3px); }
        
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .grid-item { background: rgba(162, 134, 244, 0.1); border: 1px solid rgba(162, 134, 244, 0.3); border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .grid-item:hover { background: rgba(162, 134, 244, 0.3); }
        .grid-item i { font-size: 24px; color: #a286f4; margin-bottom: 8px; }
        .grid-item p { font-size: 11px; font-weight: 600; text-transform: uppercase; }

        /* Input & Button */
        .input-box { width: 100%; padding: 15px; border-radius: 12px; border: none; margin: 15px 0; font-size: 1rem; text-align: center; font-weight: 600; background: white; color: #333; }
        .btn-purple { background: #6a1b9a; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-outline { background: transparent; color: white; border: 2px solid rgba(255,255,255,0.4); padding: 12px; border-radius: 12px; width: 100%; font-weight: 600; margin-top: 15px; cursor: pointer; }
        
        .qr-display { background: white; padding: 15px; border-radius: 20px; display: inline-block; margin: 15px 0; border: 4px solid #6a1b9a; }
        #infoDetail { background: rgba(162, 134, 244, 0.1); padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. MENU UTAMA -->
    <div id="mainMenu">
        <h1 style="margin-bottom: 25px; font-weight: 800;">WISUDA IWU 2026</h1>
        <div class="menu-card" onclick="showPage('viewKategori')">
            <i class="fas fa-user-graduate" style="font-size: 40px; color: #a286f4; margin-bottom: 10px;"></i>
            <h3>WISUDAWAN</h3>
            <p style="font-size: 12px; opacity: 0.7;">Unduh Berbagai Jenis QR</p>
        </div>
        <div class="menu-card" onclick="showPage('viewPanitia')">
            <i class="fas fa-qrcode" style="font-size: 40px; color: #a286f4; margin-bottom: 10px;"></i>
            <h3>PANITIA</h3>
            <p style="font-size: 12px; opacity: 0.7;">Scanner Kehadiran & Fasilitas</p>
        </div>
    </div>

    <!-- 2. PILIHAN KATEGORI GRID -->
    <div id="viewKategori" class="glass-card" style="display: none;">
        <h3>Pilih Layanan QR</h3>
        <div class="grid-container">
            <div class="grid-item" onclick="selectKategori('Simulasi')"><i class="fas fa-vial"></i><p>Simulasi</p></div>
            <div class="grid-item" onclick="selectKategori('Mahasiswa')"><i class="fas fa-id-badge"></i><p>Kehadiran</p></div>
            <div class="grid-item" onclick="selectKategori('Ortu')"><i class="fas fa-users"></i><p>Undangan</p></div>
            <div class="grid-item" onclick="selectKategori('Toga')"><i class="fas fa-graduation-cap"></i><p>Toga</p></div>
            <div class="grid-item" style="grid-column: span 2;" onclick="selectKategori('Ijazah')"><i class="fas fa-scroll"></i><p>Ijazah</p></div>
        </div>
        <button class="btn-outline" onclick="backToMain()">KEMBALI</button>
    </div>

    <!-- 3. INPUT NIM & GENERATE -->
    <div id="viewInputNIM" class="glass-card" style="display: none;">
        <h3 id="labelKategoriSelected">Generate QR</h3>
        <input type="text" id="nimInput" placeholder="Masukkan NIM Anda" class="input-box">
        <button id="btnCari" class="btn-purple" onclick="cariDanGenerate()">GENERATE QR</button>
        
        <div id="hasilMhs" style="display:none; margin-top:20px;">
            <div id="infoDetail"></div>
            <div class="qr-display"><canvas id="qrCanvas"></canvas></div>
            <button class="btn-purple" onclick="downloadQR()">DOWNLOAD QR</button>
        </div>
        <button class="btn-outline" onclick="showPage('viewKategori')">KEMBALI</button>
    </div>

    <!-- 4. HALAMAN PANITIA -->
    <div id="viewPanitia" class="glass-card" style="display: none;">
        <h3>Scanner Panitia</h3>
        <input type="password" id="pinField" placeholder="PIN Panitia" class="input-box">
        <button class="btn-purple" onclick="startCamera()">BUKA SCANNER</button>
        <div id="reader" style="margin-top: 20px;"></div>
        <button class="btn-outline" onclick="backToMain()">KEMBALI</button>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyQ81JcHAxpzKQyp7aHVmbnAqHA97wxzxXPshst_FgLa_n7DIvS4VoLXrahD4VqN4nF-A/exec"; 
    let selectedType = "";
    let currentData = null;

    function showPage(id) {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('viewKategori').style.display = 'none';
        document.getElementById('viewInputNIM').style.display = 'none';
        document.getElementById('viewPanitia').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    function backToMain() { showPage('mainMenu'); }

    function selectKategori(tipe) {
        selectedType = tipe;
        document.getElementById('labelKategoriSelected').innerText = "QR " + tipe;
        document.getElementById('hasilMhs').style.display = 'none';
        document.getElementById('nimInput').value = "";
        showPage('viewInputNIM');
    }

    async function cariDanGenerate() {
        const nim = document.getElementById('nimInput').value;
        const btn = document.getElementById('btnCari');
        if(!nim) return alert("Masukkan NIM!");
        
        btn.innerText = "PROSES...";
        try {
            const response = await fetch(`${URL_SCRIPT}?action=getMahasiswa&nim=${nim}`);
            const data = await response.json();
            
            if(data.nim) {
                currentData = data;
                document.getElementById('hasilMhs').style.display = 'block';
                document.getElementById('infoDetail').innerHTML = `<b>${data.nama}</b><br>Kursi: ${data.kursi}`;
                
                QRCode.toCanvas(document.getElementById('qrCanvas'), `${data.nim}|${selectedType}`, { width: 180 });
            } else { alert("NIM Tidak Ditemukan!"); }
        } catch (e) { alert("Error database!"); }
        btn.innerText = "GENERATE QR";
    }

    async function downloadQR() {
        try {
            fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify({ nim: currentData.nim, tipe: selectedType }) });
        } catch(e) {}

        const link = document.createElement('a');
        link.download = `QR_${selectedType}_${currentData.nim}.png`;
        link.href = document.getElementById('qrCanvas').toDataURL();
        link.click();
        alert("Berhasil!");
    }

    function startCamera() {
        if(document.getElementById('pinField').value === "WISUDAIWU26") {
            const html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => { alert("Scan: " + txt); });
        } else { alert("PIN Salah!"); }
    }
</script>
</body>
</html>
