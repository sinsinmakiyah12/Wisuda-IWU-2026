<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Wisuda IWU 2026</title>
    <!-- Library Penting -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0d0421; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; text-align: center; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 25px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.2); }
        .input-box { width: 100%; padding: 15px; border-radius: 12px; border: none; margin-bottom: 10px; font-size: 1rem; text-align: center; }
        .btn-purple { background: #6a1b9a; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 10px; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: black; margin-top: 15px; }
        .hidden { display: none; }
        .menu-btn { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="container">
    <!-- MENU UTAMA -->
    <div id="menuUtama">
        <h1 style="margin-bottom: 20px;">WISUDA IWU 2026</h1>
        <div class="menu-btn" onclick="tampilHalaman('viewWisudawan')"><h2>Wisudawan</h2><p>Cek Data & QR</p></div>
        <div class="menu-btn" onclick="tampilHalaman('viewPanitia')"><h2>Panitia</h2><p>Scanner Kamera</p></div>
    </div>

    <!-- HALAMAN PANITIA -->
    <div id="viewPanitia" class="glass hidden">
        <h2>Scanner Panitia</h2>
        <div id="loginPanitia">
            <input type="password" id="pinField" placeholder="Masukkan PIN" class="input-box">
            <button class="btn-purple" onclick="mulaiScanner()">AKTIFKAN KAMERA</button>
        </div>
        <div id="scannerArea" class="hidden">
            <div id="reader"></div>
            <p id="hasilScan" style="margin-top: 10px; color: #a286f4; font-weight: bold;"></p>
            <button class="btn-purple" style="background: #444;" onclick="location.reload()">STOP / KEMBALI</button>
        </div>
    </div>

    <!-- HALAMAN WISUDAWAN -->
    <div id="viewWisudawan" class="glass hidden">
        <h2>Data Wisudawan</h2>
        <input type="text" id="nimInput" placeholder="Masukkan NIM" class="input-box">
        <button class="btn-purple" onclick="alert('Fungsi Cari Aktif di Script')">CARI DATA</button>
        <button class="btn-purple" style="background: #444;" onclick="location.reload()">KEMBALI</button>
    </div>
</div>

<script>
    function tampilHalaman(id) {
        document.getElementById('menuUtama').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    function mulaiScanner() {
        const pin = document.getElementById('pinField').value;
        
        if (pin === "WISUDAIWU26") {
            document.getElementById('loginPanitia').classList.add('hidden');
            document.getElementById('scannerArea').classList.remove('hidden');

            const html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                (decodedText) => {
                    document.getElementById('hasilScan').innerText = "Terdeteksi: " + decodedText;
                    // Suara bip atau getar bisa ditambah di sini
                    alert("Berhasil Scan: " + decodedText);
                },
                (errorMessage) => { /* scanning... */ }
            ).catch(err => {
                alert("Kamera Error: Pastikan Izin Kamera Diberikan!");
                console.error(err);
            });
        } else {
            alert("PIN SALAH!");
        }
    }
</script>
</body>
</html>
