<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisuda IWU 2026</title>
    <!-- Library QR & Scanner -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #6654f1 0%, #a246f1 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }

        /* Glassmorphism Card */
        .card { 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px; 
            border-radius: 40px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
            width: 100%; 
            max-width: 550px; 
            text-align: center; 
            border: 1.5px solid rgba(255,255,255,0.3);
        }

        h1 { color: white; margin-bottom: 40px; font-size: 2rem; font-weight: 800; letter-spacing: 0.5px; }

        /* Input Styling */
        .input-field { 
            width: 100%; 
            padding: 18px 25px; 
            margin-bottom: 25px; 
            border-radius: 18px; 
            border: none; 
            font-size: 1.1rem; 
            background: white;
            color: #555;
            outline: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* Button Cek Data (Biru Cerah) */
        .btn-cek { 
            background: #4cc9f0; 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 18px; 
            cursor: pointer; 
            font-weight: 800; 
            width: 100%; 
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-bottom: 18px;
            box-shadow: 0 10px 20px rgba(76, 201, 240, 0.3);
        }

        .btn-cek:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(76, 201, 240, 0.4); }

        /* Button Area Panitia (Outline Putih) */
        .btn-panitia { 
            background: transparent; 
            color: white; 
            border: 2px solid white; 
            padding: 18px; 
            border-radius: 18px; 
            cursor: pointer; 
            font-weight: 600; 
            width: 100%; 
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-panitia:hover { background: rgba(255,255,255,0.1); }

        /* QR & Result Area */
        .info-box { color: white; margin-bottom: 25px; }
        .qr-container { background: white; padding: 20px; border-radius: 25px; display: inline-block; margin: 10px 0; }
        
        #noData { display:none; color: #fff; background: rgba(255, 77, 77, 0.4); padding: 12px; border-radius: 12px; margin-top: 15px; }

        /* Admin Area */
        #scannerArea { width: 100%; }
        #reader { border-radius: 20px; overflow: hidden; margin-top: 15px; border: 2px solid white !important; }
    </style>
</head>
<body>

    <div class="card">
        <div id="mainUI">
            <h1>Wisuda IWU 2026</h1>
            
            <div id="searchBox">
                <input type="text" id="nimInput" placeholder="Masukkan NIM Anda" class="input-field">
                <button class="btn-cek" onclick="loadMahasiswaData()">CEK DATA & QR</button>
                <button class="btn-panitia" onclick="goToAdmin()">AREA PANITIA</button>
            </div>

            <div id="noData">NIM tidak terdaftar. Cek kembali atau hubungi HIMAIF.</div>

            <!-- Area Hasil Scan Mahasiswa -->
            <div id="resultArea" style="display:none;">
                <div class="info-box" id="infoMhs"></div>
                <div class="qr-container"><canvas id="qrCanvas"></canvas></div>
                <button class="btn-panitia" onclick="location.reload()" style="margin-top:25px;">KEMBALI</button>
            </div>
        </div>

        <!-- Area Login & Scanner Panitia -->
        <div id="adminArea" style="display:none;">
            <div id="loginPanitia">
                <h2 style="color:white; margin-bottom:20px;">LOGIN PANITIA</h2>
                <input type="password" id="pinInput" placeholder="Masukkan PIN" class="input-field" style="text-align:center;">
                <button class="btn-cek" onclick="verifyPin()">MASUK</button>
                <button class="btn-panitia" onclick="location.reload()">BATAL</button>
            </div>
            <div id="scannerArea" style="display:none;">
                <h2 style="color:white;">SCANNER PRESENSI</h2>
                <div id="reader"></div>
                <p id="scanStatus" style="color:white; margin-top:15px; font-weight:600;"></p>
                <button class="btn-panitia" onclick="location.reload()" style="margin-top:20px;">KELUAR</button>
            </div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtVl3lHGkb_vb7-cQuycylVz-ClfM6Kq2Q58TBbdbClXPfKrOpWfM0Ryn0moTdqUGxCg/exec'; // GANTI INI
        const PIN_AKSES = 'WISUDAIWU26'; 
        let scanner;

        async function loadMahasiswaData() {
            const nim = document.getElementById('nimInput').value.trim();
            if(!nim) return;

            try {
                const res = await fetch(`${APPS_SCRIPT_URL}?action=getMahasiswa&nim=${nim}`);
                const data = await res.json();

                if(data.nim) {
                    document.getElementById('searchBox').style.display = 'none';
                    document.getElementById('noData').style.display = 'none';
                    document.getElementById('resultArea').style.display = 'block';
                    document.getElementById('infoMhs').innerHTML = `<h3>${data.nama}</h3><p>${data.prodi}</p><p>Kursi: <b>${data.kursi}</b></p>`;
                    
                    QRCode.toCanvas(document.getElementById('qrCanvas'), `MHS:${data.nim}`, { width: 220 });
                } else {
                    document.getElementById('noData').style.display = 'block';
                }
            } catch(e) { alert("Koneksi gagal."); }
        }

        function goToAdmin() {
            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('adminArea').style.display = 'block';
        }

        function verifyPin() {
            if(document.getElementById('pinInput').value === PIN_AKSES) {
                document.getElementById('loginPanitia').style.display = 'none';
                document.getElementById('scannerArea').style.display = 'block';
                startCamera();
            } else { alert("PIN Salah!"); }
        }

        function startCamera() {
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                document.getElementById('scanStatus').innerText = "Memproses...";
                sendScanData(txt);
            }).catch(e => alert("Kamera error: " + e));
        }

        async function sendScanData(txt) {
            try {
                const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({action: 'scanQR', data: txt}) });
                const out = await res.json();
                document.getElementById('scanStatus').innerText = out.message;
                document.getElementById('scanStatus').style.color = out.success ? "#00ff00" : "#ff4d4d";
            } catch(e) { document.getElementById('scanStatus').innerText = "Gagal kirim data."; }
        }
    </script>
</body>
</html>
