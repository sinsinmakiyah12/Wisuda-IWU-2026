<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Wisuda IWU 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: #0d0421; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            color: white; 
        }
        .container { width: 100%; max-width: 500px; text-align: center; }
        
        /* TAMPILAN UTAMA SESUAI GAMBAR */
        .title-main { font-size: 2.2rem; font-weight: 800; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 1px; }

        .btn-wisudawan { 
            background: #8e24aa; 
            color: white; border: none; padding: 60px 20px; border-radius: 30px; 
            width: 100%; font-weight: 700; cursor: pointer; text-transform: uppercase;
            margin-bottom: 40px; display: block;
            box-shadow: inset 0 2px 10px rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .btn-wisudawan i { font-size: 24px; margin-bottom: 10px; display: block; }
        .btn-wisudawan span { font-size: 16px; letter-spacing: 1px; }

        .btn-scanner { 
            background: transparent; color: white; border: 2px solid #3d364d; 
            padding: 30px; border-radius: 40px; width: 100%; font-weight: 700; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        /* EFEK GLOSSY UNTUK CARD LAYANAN */
        .glass-card { 
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(20px); 
            border-radius: 40px; 
            padding: 35px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        /* GRID LAYANAN */
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 30px; }
        .grid-item { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 30px 10px; cursor: pointer; transition: 0.3s;
        }
        .grid-item.full-width { grid-column: span 2; }
        .grid-item i { font-size: 28px; color: #a286f4; margin-bottom: 10px; display: block; }
        .grid-item p { font-size: 11px; font-weight: 700; text-transform: uppercase; }

        /* INPUT & QR DISPLAY */
        .input-box { 
            width: 100%; padding: 18px; border-radius: 15px; border: none; 
            margin: 20px 0; font-size: 1rem; text-align: center; font-weight: 600; 
            background: white; color: #333; 
        }
        .qr-display { background: white; padding: 15px; border-radius: 20px; display: inline-block; margin: 20px 0; }
        
        #statusMessage { font-size: 13px; margin-top: 10px; color: #4caf50; font-weight: 600; }
        .btn-action { background: #8e24aa; color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <!-- MENU UTAMA -->
    <div id="mainMenu">
        <h1 class="title-main">WISUDA IWU 2026</h1>
        <button class="btn-wisudawan" onclick="showPage('viewKategori')">
            <i class="fas fa-user-graduate"></i>
            <span>WISUDAWAN</span>
        </button>
        <button class="btn-scanner" onclick="showPage('viewPanitia')">
            PANITIA SCANNER
        </button>
    </div>

    <!-- PILIH LAYANAN -->
    <div id="viewKategori" class="glass-card" style="display: none;">
        <h2 style="font-weight: 700; margin-bottom: 10px;">Pilih Layanan</h2>
        <div class="grid-container">
            <div class="grid-item" onclick="selectKategori('Simulasi')"><i class="fas fa-vial"></i><p>Simulasi</p></div>
            <div class="grid-item" onclick="selectKategori('Kehadiran')"><i class="fas fa-id-badge"></i><p>Kehadiran</p></div>
            <div class="grid-item" onclick="selectKategori('Undangan')"><i class="fas fa-users"></i><p>Undangan</p></div>
            <div class="grid-item" onclick="selectKategori('Toga')"><i class="fas fa-graduation-cap"></i><p>Toga</p></div>
            <div class="grid-item full-width" onclick="selectKategori('Ijazah')"><i class="fas fa-scroll"></i><p>Ijazah</p></div>
        </div>
        <button class="btn-scanner" style="margin-top: 20px; padding: 15px; border-radius: 20px;" onclick="showPage('mainMenu')">KEMBALI</button>
    </div>

    <!-- GENERATE QR -->
    <div id="viewInputNIM" class="glass-card" style="display: none;">
        <h2 id="labelKategoriSelected" style="color: #a286f4; text-transform: uppercase;">QR</h2>
        <input type="text" id="nimInput" placeholder="MASUKKAN NIM" class="input-box">
        <button id="btnCari" class="btn-action" onclick="cariDanGenerate()">GENERATE QR</button>
        
        <div id="hasilMhs" style="display:none; margin-top:20px;">
            <div id="infoDetail" style="margin-bottom: 10px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;"></div>
            <div class="qr-display"><canvas id="qrCanvas"></canvas></div><br>
            
            <button id="btnDownload" class="btn-action" style="background: #2e7d32;" onclick="prosesDownload()">
                <i class="fas fa-download"></i> DOWNLOAD QR
            </button>
            <div id="statusMessage"></div>
        </div>
        <button class="btn-scanner" style="margin-top: 20px; padding: 15px; border-radius: 20px;" onclick="showPage('viewKategori')">KEMBALI</button>
    </div>

    <!-- PANITIA -->
    <div id="viewPanitia" class="glass-card" style="display: none;">
        <h2>PANITIA ACCESS</h2>
        <input type="password" id="pinField" placeholder="PIN" class="input-box">
        <button class="btn-action" onclick="startCamera()">OPEN SCANNER</button>
        <div id="reader" style="margin-top: 20px; border-radius: 20px; overflow: hidden;"></div>
        <button class="btn-scanner" style="margin-top: 20px; padding: 15px; border-radius: 20px;" onclick="showPage('mainMenu')">KEMBALI</button>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbx74HXiCFngZ02pZoXcqX7zpoVcyOrJykK3opuCWF1PpQH_ADVhxxDVbYXKerYv9ANXmQ/exec"; 
    let selectedType = "";
    let currentData = null;

    function showPage(id) {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('viewKategori').style.display = 'none';
        document.getElementById('viewInputNIM').style.display = 'none';
        document.getElementById('viewPanitia').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    function selectKategori(tipe) {
        selectedType = tipe;
        document.getElementById('labelKategoriSelected').innerText = "QR " + tipe;
        document.getElementById('hasilMhs').style.display = 'none';
        document.getElementById('statusMessage').innerText = "";
        document.getElementById('nimInput').value = "";
        showPage('viewInputNIM');
    }

    async function cariDanGenerate() {
        const nim = document.getElementById('nimInput').value;
        const btn = document.getElementById('btnCari');
        if(!nim) return alert("Isi NIM!");
        btn.innerText = "LOADING...";
        try {
            const res = await fetch(`${URL_SCRIPT}?action=getMahasiswa&nim=${nim}`);
            const data = await res.json();
            if(data.nim) {
                currentData = data;
                document.getElementById('hasilMhs').style.display = 'block';
                document.getElementById('infoDetail').innerHTML = `<b>${data.nama}</b><br>Kursi: ${data.kursi}`;
                QRCode.toCanvas(document.getElementById('qrCanvas'), `${data.nim}|${selectedType}`, { width: 200 });
            } else { alert("NIM tidak ditemukan!"); }
        } catch (e) { alert("Error database!"); }
        btn.innerText = "GENERATE QR";
    }

    function prosesDownload() {
        if(!currentData) return;
        const canvas = document.getElementById('qrCanvas');
        const link = document.createElement('a');
        link.download = `QR_${selectedType}_${currentData.nim}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();

        const skrg = new Date();
        const jam = skrg.getHours().toString().padStart(2, '0') + ":" + 
                    skrg.getMinutes().toString().padStart(2, '0') + ":" + 
                    skrg.getSeconds().toString().padStart(2, '0');

        document.getElementById('btnDownload').innerHTML = `<i class="fas fa-check"></i> BERHASIL`;
        document.getElementById('statusMessage').innerHTML = `Selesai pada: ${jam} ✓`;
    }

    function startCamera() {
        if(document.getElementById('pinField').value === "WISUDAIWU26") {
            const html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => { alert(txt); });
        } else { alert("PIN Salah!"); }
    }
</script>
</body>
</html>
