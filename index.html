<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Wisuda IWU 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS Singkat untuk Tampilan Professional */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); width: 100%; max-width: 500px; text-align: center; border: 1px solid rgba(255,255,255,0.3); }
        h2 { color: white; margin-bottom: 20px; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; font-size: 1rem; box-sizing: border-box; }
        .btn-primary { background: #4facfe; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-secondary { background: transparent; color: white; border: 1px solid white; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-top: 15px; width: 100%; }
        .qr-card { background: white; padding: 15px; border-radius: 15px; margin-top: 20px; }
        #noData { background: rgba(255, 0, 0, 0.2); color: white; padding: 10px; border-radius: 10px; margin-top: 15px; border: 1px solid #ff4d4d; }
    </style>
</head>
<body>

    <!-- SECTION 1: SEARCH NIM -->
    <div id="mainInputArea" class="card">
        <h2>Wisuda IWU 2026</h2>
        <div id="inputBox">
            <input type="text" id="nimInput" placeholder="Masukkan NIM Anda" class="input-field">
            <button class="btn-primary" onclick="loadMahasiswaData()">CEK DATA & QR</button>
            <button class="btn-secondary" onclick="showAdmin()">AREA PANITIA</button>
        </div>
        
        <!-- Pesan Error -->
        <div id="noData" style="display:none;">
            <i class="fas fa-exclamation-circle"></i> NIM tidak ditemukan! <br>Pastikan benar atau hubungi Admin HIMAIF.
        </div>

        <!-- Tampilan Hasil & QR -->
        <div id="resultArea" style="display:none; margin-top: 20px;">
            <div id="infoMhs"></div>
            <div id="qrGrid"></div>
            <button class="btn-secondary" onclick="location.reload()">KEMBALI</button>
        </div>
    </div>

    <!-- SECTION 2: AREA PANITIA (WITH PIN) -->
    <div id="adminSection" class="card" style="display: none;">
        <h2>Area Panitia</h2>
        <div id="loginArea">
            <p style="color: white;">Masukkan PIN Keamanan untuk mengakses Scanner.</p>
            <input type="password" id="pinInput" placeholder="Masukkan PIN" class="input-field" style="max-width: 200px; text-align: center;">
            <button class="btn-primary" onclick="checkPin()">MASUK</button>
            <button class="btn-secondary" onclick="hideAdmin()">KEMBALI</button>
        </div>

        <!-- Area Scanner -->
        <div id="scannerArea" style="display: none;">
            <div id="reader" style="width: 100%; border-radius: 15px; overflow: hidden;"></div>
            <p id="scanResult" style="color: white; margin-top: 10px;"></p>
            <button class="btn-secondary" onclick="hideAdmin()">KELUAR</button>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzmskt5K9VEh_Jwet6A4OiEOaF2fdpzz5P08zumvQee3bgPNbnYElDrVA9SWeqJoxrZLg/exec'; // GANTI DENGAN LINK DEPLOY TERBARU
        const ADMIN_PIN = "WISUDAIWU26"; // PIN Akses Panitia

        // --- FUNGSI SEARCH MAHASISWA ---
        async function loadMahasiswaData() {
            const nim = document.getElementById('nimInput').value.trim();
            if (!nim) return alert('Masukkan NIM!');

            const inputBox = document.getElementById('inputBox');
            const noData = document.getElementById('noData');
            const resultArea = document.getElementById('resultArea');
            const infoMhs = document.getElementById('infoMhs');

            noData.style.display = 'none';
            inputBox.innerHTML = '<i class="fas fa-spinner fa-spin" style="color:white; font-size:2rem;"></i>';

            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=getMahasiswa&nim=${encodeURIComponent(nim)}`);
                const data = await response.json();

                if (data && data.nim) {
                    inputBox.style.display = 'none';
                    resultArea.style.display = 'block';
                    infoMhs.innerHTML = `
                        <h3 style="color: white; margin-bottom:5px;">${data.nama}</h3>
                        <p style="color: white; opacity:0.8;">${data.prodi} <br> <b>Kursi: ${data.kursi}</b></p>
                    `;
                    generateQRCodes(data.nim);
                } else {
                    location.reload(); // Reset untuk coba lagi
                    alert('NIM tidak terdaftar!');
                }
            } catch (err) {
                alert('Gagal koneksi ke database.');
                location.reload();
            }
        }

        function generateQRCodes(nim) {
            const qrGrid = document.getElementById('qrGrid');
            const categories = [{id: 'mhs', name: 'QR Presensi Wisudawan'}];
            
            qrGrid.innerHTML = categories.map(c => `
                <div class="qr-card">
                    <p style="color: #333; font-weight: bold; margin-bottom: 10px;">${c.name}</p>
                    <canvas id="qr_${c.id}"></canvas>
                </div>
            `).join('');

            categories.forEach(c => {
                QRCode.toCanvas(document.getElementById(`qr_${c.id}`), `MHS:${nim}:${c.id}`, { width: 200 });
            });
        }

        // --- FUNGSI AREA PANITIA ---
        function showAdmin() {
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('mainInputArea').style.display = 'none';
        }

        function hideAdmin() {
            document.getElementById('adminSection').style.display = 'none';
            document.getElementById('mainInputArea').style.display = 'block';
            document.getElementById('loginArea').style.display = 'block';
            document.getElementById('scannerArea').style.display = 'none';
            document.getElementById('pinInput').value = '';
        }

        function checkPin() {
            const pin = document.getElementById('pinInput').value;
            if (pin === ADMIN_PIN) {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('scannerArea').style.display = 'block';
                // startScanner(); // Panggil fungsi scanner kamu di sini
            } else {
                alert('PIN Salah!');
            }
        }
    </script>
</body>
</html>
