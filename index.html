<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Wisuda IWU 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <!-- Library untuk Scanner Panitia -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: linear-gradient(180deg, #0f0524 0%, #1a0b3d 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            color: white; 
        }
        .container { width: 100%; max-width: 400px; }

        .menu-wrapper { display: flex; flex-direction: column; gap: 25px; }
        
        .menu-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 35px;
            padding: 45px 25px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease, background 0.3s ease;
        }
        .menu-card:hover { 
            background: rgba(255, 255, 255, 0.06); 
            transform: translateY(-3px);
        }
        
        .menu-card i { 
            font-size: 85px; 
            color: #8c76cc; 
            margin-bottom: 25px; 
            display: block;
            opacity: 0.9;
        }
        .menu-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .menu-card p { font-size: 14px; opacity: 0.7; line-height: 1.4; padding: 0 10px; }

        .glass-card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); 
            border-radius: 35px; 
            padding: 35px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            text-align: center;
        }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .grid-item { 
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px; padding: 22px 5px; cursor: pointer;
        }
        .grid-item i { font-size: 22px; color: #a286f4; margin-bottom: 8px; display: block; }
        .grid-item p { font-size: 11px; font-weight: 600; text-transform: uppercase; }

        .input-box { 
            width: 100%; padding: 18px; border-radius: 15px; border: none; 
            margin: 20px 0; font-size: 1rem; text-align: center; font-weight: 600; 
            background: rgba(255,255,255,0.95); color: #222;
        }
        .btn-action { 
            background: #7b1fa2; color: white; border: none; padding: 18px; 
            border-radius: 15px; width: 100%; font-weight: 700; cursor: pointer;
        }
        .btn-back { 
            background: transparent; border: 1px solid rgba(255,255,255,0.15); 
            color: white; padding: 12px; border-radius: 15px; margin-top: 20px; 
            width: 100%; cursor: pointer; font-size: 13px;
        }
        
        .qr-display { background: white; padding: 12px; border-radius: 20px; display: inline-block; margin: 20px 0; }
        .info-mhs { background: rgba(255,255,255,0.06); padding: 15px; border-radius: 15px; margin-bottom: 12px; font-size: 14px; }
        #statusMessage { font-size: 12px; margin-top: 10px; color: #81c784; font-weight: 600; }
        
        /* Scanner Styling */
        #reader { width: 100%; border-radius: 20px; overflow: hidden; background: #000; margin-top: 10px; }
        .scan-feedback { margin-top: 15px; padding: 15px; border-radius: 15px; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <!-- MENU UTAMA -->
    <div id="mainMenu" class="menu-wrapper">
        <div class="menu-card" onclick="showPage('viewKategori')">
            <i class="fas fa-user-graduate"></i>
            <h2>Wisudawan</h2>
            <p>Unduh QR Code Kehadiran & Atribut</p>
        </div>

        <div class="menu-card" onclick="showPage('viewPanitiaGrid')">
            <i class="fas fa-qrcode"></i>
            <h2>Panitia</h2>
            <p>Scanner Verifikasi Real-time</p>
        </div>
    </div>

    <!-- PILIH LAYANAN (WISUDAWAN) -->
    <div id="viewKategori" class="glass-card" style="display: none;">
        <h2 style="margin-bottom: 5px;">Layanan Wisuda</h2>
        <div class="grid-container">
            <div class="grid-item" onclick="selectKategori('Simulasi')"><i class="fas fa-vial"></i><p>Simulasi</p></div>
            <div class="grid-item" onclick="selectKategori('Kehadiran')"><i class="fas fa-id-badge"></i><p>Kehadiran</p></div>
            <div class="grid-item" onclick="selectKategori('Undangan')"><i class="fas fa-users"></i><p>Undangan</p></div>
            <div class="grid-item" onclick="selectKategori('Toga')"><i class="fas fa-graduation-cap"></i><p>Toga</p></div>
            <div class="grid-item" style="grid-column: span 2;" onclick="selectKategori('Ijazah')"><i class="fas fa-scroll"></i><p>Ijazah</p></div>
        </div>
        <button class="btn-back" onclick="showPage('mainMenu')">KEMBALI</button>
    </div>

    <!-- GENERATE QR (WISUDAWAN) -->
    <div id="viewInputNIM" class="glass-card" style="display: none;">
        <h2 id="labelKategori" style="color: #a286f4; text-transform: uppercase; font-size: 18px;">QR</h2>
        <input type="text" id="nimInput" placeholder="MASUKKAN NIM" class="input-box">
        <button id="btnCari" class="btn-action" onclick="fetchData()">GENERATE QR</button>
        
        <div id="hasilMhs" style="display:none; margin-top:20px;">
            <div id="infoDetail" class="info-mhs"></div>
            <div class="qr-display"><canvas id="qrCanvas"></canvas></div><br>
            <button id="btnDownload" class="btn-action" style="background: #388e3c;" onclick="downloadQR()">
                <i class="fas fa-download"></i> SIMPAN QR
            </button>
            <div id="statusMessage"></div>
        </div>
        <button class="btn-back" onclick="showPage('viewKategori')">KEMBALI</button>
    </div>

    <!-- PILIH GRID SCAN (PANITIA) -->
    <div id="viewPanitiaGrid" class="glass-card" style="display: none;">
        <h2 style="margin-bottom: 5px;">Panel Panitia</h2>
        <p style="font-size: 12px; opacity: 0.7;">Pilih Bagian Verifikasi:</p>
        <div class="grid-container">
            <div class="grid-item" onclick="startPanitiaScan('Simulasi')"><i class="fas fa-vial"></i><p>Simulasi</p></div>
            <div class="grid-item" onclick="startPanitiaScan('Ortu')"><i class="fas fa-gift"></i><p>Ortu (Goodie)</p></div>
            <div class="grid-item" onclick="startPanitiaScan('Mahasiswa')"><i class="fas fa-user-check"></i><p>Mahasiswa</p></div>
            <div class="grid-item" onclick="startPanitiaScan('Toga')"><i class="fas fa-graduation-cap"></i><p>Toga</p></div>
            <div class="grid-item" style="grid-column: span 2;" onclick="startPanitiaScan('Ijazah')"><i class="fas fa-scroll"></i><p>Ijazah</p></div>
        </div>
        <button class="btn-back" onclick="showPage('mainMenu')">KEMBALI</button>
    </div>

    <!-- HALAMAN SCANNER (PANITIA) -->
    <div id="viewScanner" class="glass-card" style="display: none;">
        <h2 id="labelScanMode" style="color: #a286f4; text-transform: uppercase; font-size: 18px; margin-bottom: 15px;">SCAN</h2>
        <div id="reader"></div>
        <div id="scanFeedback" class="scan-feedback" style="display: none;"></div>
        <button class="btn-back" onclick="stopScanner()">GANTI GRID</button>
    </div>
</div>

<script>
    // MASUKKAN URL WEB APP APPS SCRIPT KAMU DI SINI
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2jB5p38L5J-3BFK8Utg3mbum7el1P4EeRoV-jpsU1w2eyP6SRKJwaG9SmTvfdaH7sDA/exec";
    
    let currentType = "";
    let studentData = null;
    let html5QrCode = null;
    let selectedTipePanitia = "";

    function showPage(id) {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('viewKategori').style.display = 'none';
        document.getElementById('viewInputNIM').style.display = 'none';
        document.getElementById('viewPanitiaGrid').style.display = 'none';
        document.getElementById('viewScanner').style.display = 'none';
        
        if (id === 'mainMenu') {
            document.getElementById(id).style.display = 'flex';
        } else {
            document.getElementById(id).style.display = 'block';
        }
    }

    // LOGIKA WISUDAWAN (AMAN)
    function selectKategori(tipe) {
        currentType = tipe;
        document.getElementById('labelKategori').innerText = "QR " + tipe;
        document.getElementById('hasilMhs').style.display = 'none';
        document.getElementById('statusMessage').innerText = "";
        document.getElementById('nimInput').value = "";
        showPage('viewInputNIM');
    }

    async function fetchData() {
        const nimInput = document.getElementById('nimInput').value.trim();
        const btn = document.getElementById('btnCari');
        if(!nimInput) return alert("NIM tidak boleh kosong!");
        btn.innerText = "PROSES...";
        btn.disabled = true;

        try {
            const response = await fetch(`${SCRIPT_URL}?action=getMahasiswa&nim=${nimInput}`);
            const data = await response.json();
            if(data.nim) {
                studentData = data;
                document.getElementById('hasilMhs').style.display = 'block';
                document.getElementById('infoDetail').innerHTML = `<strong>${data.nama}</strong><br>Kursi: ${data.kursi || '-'}`;
                QRCode.toCanvas(document.getElementById('qrCanvas'), `${data.nim}|${currentType}`, { width: 180, margin: 2 });
            } else { alert("NIM tidak ditemukan!"); }
        } catch (e) { alert("Gagal memuat data."); } 
        finally { btn.innerText = "GENERATE QR"; btn.disabled = false; }
    }

    async function downloadQR() {
        if(!studentData) return;
        const canvas = document.getElementById('qrCanvas');
        const link = document.createElement('a');
        link.download = `QR_${currentType}_${studentData.nim}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify({ nim: studentData.nim, tipe: currentType })
            });
            document.getElementById('btnDownload').innerHTML = `<i class="fas fa-check"></i> BERHASIL`;
            document.getElementById('statusMessage').innerHTML = `Diunduh & dicatat ✓`;
        } catch (e) { console.error("Gagal update database"); }
    }

    // LOGIKA PANITIA (BARU)
    function startPanitiaScan(tipe) {
        selectedTipePanitia = tipe;
        document.getElementById('labelScanMode').innerText = "SCAN " + tipe;
        document.getElementById('scanFeedback').style.display = 'none';
        showPage('viewScanner');
        
        if(!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            (decodedText) => {
                const nimScan = decodedText.split('|')[0];
                executeVerify(nimScan);
                html5QrCode.pause(); 
            }
        ).catch(err => alert("Kamera Error: " + err));
    }

    async function executeVerify(nim) {
        const feedback = document.getElementById('scanFeedback');
        feedback.style.display = 'block';
        feedback.style.background = "rgba(255,255,255,0.1)";
        feedback.innerHTML = "Memproses...";

        try {
            const response = await fetch(`${SCRIPT_URL}?action=verify&nim=${nim}&tipe=${selectedTipePanitia}`);
            const res = await response.json();

            if(res.status === "success") {
                feedback.style.background = "rgba(56, 142, 60, 0.4)";
                feedback.innerHTML = `<i class="fas fa-check-circle"></i> BERHASIL!<br>${res.nama}<br><span style="font-size:11px">${res.pesan}</span>`;
                setTimeout(() => { feedback.style.display = 'none'; html5QrCode.resume(); }, 2500);
            } else {
                feedback.style.background = "rgba(211, 47, 47, 0.4)";
                feedback.innerHTML = `<i class="fas fa-times-circle"></i> GAGAL!<br>NIM Tidak Ditemukan`;
                setTimeout(() => { feedback.style.display = 'none'; html5QrCode.resume(); }, 2500);
            }
        } catch (e) { alert("Koneksi Gagal"); html5QrCode.resume(); }
    }

    function stopScanner() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => showPage('viewPanitiaGrid')).catch(() => showPage('viewPanitiaGrid'));
        } else { showPage('viewPanitiaGrid'); }
    }
</script>
</body>
</html>
