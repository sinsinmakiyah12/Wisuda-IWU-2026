<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Wisuda IWU 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e0b4d, #0d0421); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }

        .container { width: 100%; max-width: 500px; }

        /* Menu Card Styling (Sesuai Gambar) */
        .menu-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 20px;
            margin-bottom: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .menu-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .menu-card i { font-size: 60px; margin-bottom: 20px; color: #a286f4; opacity: 0.8; }
        .menu-card h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
        .menu-card p { font-size: 0.9rem; opacity: 0.7; line-height: 1.5; }

        /* Main Glass Card (For Search & Scanner) */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 35px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            display: none; /* Hidden by default */
        }

        .input-field {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            margin-bottom: 20px; font-size: 1rem; background: white; outline: none;
        }

        .btn-blue {
            background: #4cc9f0; color: white; border: none; padding: 18px;
            border-radius: 15px; width: 100%; font-weight: 700; cursor: pointer;
            text-transform: uppercase; margin-bottom: 15px;
        }

        .btn-outline {
            background: transparent; color: white; border: 2px solid white;
            padding: 15px; border-radius: 15px; width: 100%; cursor: pointer;
        }

        .qr-area { background: white; padding: 20px; border-radius: 20px; display: inline-block; margin: 20px 0; }
        #reader { border-radius: 20px; overflow: hidden; border: 2px solid white !important; }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- STEP 1: MENU UTAMA -->
        <div id="mainMenu">
            <div class="menu-card" onclick="showWisudawan()">
                <i class="fas fa-user-graduate"></i>
                <h2>Wisudawan</h2>
                <p>Unduh QR Code Kehadiran & Atribut</p>
            </div>

            <div class="menu-card" onclick="showPanitia()">
                <i class="fas fa-qrcode"></i>
                <h2>Panitia</h2>
                <p>Scanner Verifikasi Real-time</p>
            </div>
        </div>

        <!-- STEP 2: AREA WISUDAWAN -->
        <div id="areaWisudawan" class="glass-card">
            <h2 style="color:white; margin-bottom:25px;">Cek Data Wisuda</h2>
            <input type="text" id="nimInput" placeholder="Masukkan NIM Anda" class="input-field">
            <button class="btn-blue" onclick="loadMahasiswaData()">LIHAT QR CODE</button>
            <button class="btn-outline" onclick="goBack()">KEMBALI</button>

            <div id="resultMhs" style="display:none; margin-top:30px;">
                <div id="infoMhs" style="color:white; margin-bottom:15px;"></div>
                <div class="qr-area"><canvas id="qrCanvas"></canvas></div>
            </div>
        </div>

        <!-- STEP 3: AREA PANITIA (LOGIN) -->
        <div id="areaPanitia" class="glass-card">
            <div id="loginSection">
                <h2 style="color:white; margin-bottom:25px;">Akses Panitia</h2>
                <input type="password" id="pinInput" placeholder="Masukkan PIN" class="input-field" style="text-align:center;">
                <button class="btn-blue" onclick="checkPin()">MASUK</button>
                <button class="btn-outline" onclick="goBack()">KEMBALI</button>
            </div>

            <div id="scannerSection" style="display:none;">
                <h2 style="color:white; margin-bottom:15px;">Scanner Aktif</h2>
                <div id="reader"></div>
                <p id="scanStatus" style="color:white; margin-top:20px; font-weight:600;"></p>
                <button class="btn-outline" onclick="location.reload()" style="margin-top:20px;">KELUAR</button>
            </div>
        </div>

    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtVl3lHGkb_vb7-cQuycylVz-ClfM6Kq2Q58TBbdbClXPfKrOpWfM0Ryn0moTdqUGxCg/exec'; // GANTI INI
        const ADMIN_PIN = "WISUDAIWU26";
        let html5QrCode;

        function showWisudawan() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('areaWisudawan').style.display = 'block';
        }

        function showPanitia() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('areaPanitia').style.display = 'block';
        }

        function goBack() {
            location.reload();
        }

        async function loadMahasiswaData() {
            const nim = document.getElementById('nimInput').value.trim();
            if(!nim) return;
            try {
                const res = await fetch(`${APPS_SCRIPT_URL}?action=getMahasiswa&nim=${nim}`);
                const data = await res.json();
                if(data.nim) {
                    document.getElementById('resultMhs').style.display = 'block';
                    document.getElementById('infoMhs').innerHTML = `<h3>${data.nama}</h3><p>${data.prodi}<br>Kursi: ${data.kursi}</p>`;
                    QRCode.toCanvas(document.getElementById('qrCanvas'), `MHS:${data.nim}`, { width: 200 });
                } else { alert("NIM tidak ditemukan!"); }
            } catch(e) { alert("Error koneksi."); }
        }

        function checkPin() {
            if(document.getElementById('pinInput').value === ADMIN_PIN) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('scannerSection').style.display = 'block';
                startScanner();
            } else { alert("PIN Salah!"); }
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                document.getElementById('scanStatus').innerText = "Memproses...";
                sendScan(txt);
            });
        }

        async function sendScan(txt) {
            try {
                const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({action: 'scanQR', data: txt}) });
                const out = await res.json();
                const status = document.getElementById('scanStatus');
                status.innerText = out.message;
                status.style.color = out.success ? "#00ff00" : "#ff4d4d";
            } catch(e) { }
        }
    </script>
</body>
</html>
