<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Wisuda IWU 2026</title>
    <!-- Library QR & Font -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Gaya Dasar & Background Gelap */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: radial-gradient(circle at top right, #1e0b4d, #0d0421); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
            color: white;
        }

        .container { width: 100%; max-width: 450px; text-align: center; }

        /* MENU UTAMA - KARTU PILIHAN */
        .menu-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 25px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .menu-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .menu-card i { font-size: 55px; margin-bottom: 20px; color: #a286f4; }
        .menu-card h2 { font-size: 1.6rem; margin-bottom: 8px; font-weight: 700; }
        .menu-card p { font-size: 0.95rem; opacity: 0.7; font-weight: 400; }

        /* GLASS CARD UNTUK FORM & SCANNER */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none; /* Sembunyi sampai dipilih */
        }

        /* Input & Button */
        .input-box {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            margin-bottom: 20px; font-size: 1rem; outline: none; background: white;
        }
        .btn-action {
            background: #4cc9f0; color: white; border: none; padding: 18px;
            border-radius: 15px; width: 100%; font-weight: 700; cursor: pointer;
            text-transform: uppercase; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(76, 201, 240, 0.3);
        }
        .btn-back {
            background: transparent; color: white; border: 2px solid white;
            padding: 15px; border-radius: 15px; width: 100%; cursor: pointer; font-weight: 600;
        }

        /* Hasil QR */
        .qr-display { background: white; padding: 20px; border-radius: 20px; display: inline-block; margin: 20px 0; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 2px solid white !important; }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- BAGIAN 1: MENU UTAMA (TAMPILAN AWAL) -->
        <div id="uiMenu">
            <div class="menu-card" onclick="openWisudawan()">
                <i class="fas fa-user-graduate"></i>
                <h2>Wisudawan</h2>
                <p>Unduh QR Code Kehadiran & Atribut</p>
            </div>

            <div class="menu-card" onclick="openPanitia()">
                <i class="fas fa-qrcode"></i>
                <h2>Panitia</h2>
                <p>Scanner Verifikasi Real-time</p>
            </div>
        </div>

        <!-- BAGIAN 2: FORM WISUDAWAN -->
        <div id="uiWisudawan" class="glass-card">
            <h2 style="margin-bottom:25px;">Cek Data Wisuda</h2>
            <input type="text" id="nimMhs" placeholder="Masukkan NIM" class="input-box">
            <button class="btn-action" onclick="getQR()">TAMPILKAN QR</button>
            <button class="btn-back" onclick="backToMenu()">KEMBALI</button>

            <div id="hasilMhs" style="display:none; margin-top:30px;">
                <div id="detailMhs"></div>
                <div class="qr-display"><canvas id="canvasQR"></canvas></div>
            </div>
        </div>

        <!-- BAGIAN 3: LOGIN & SCANNER PANITIA -->
        <div id="uiPanitia" class="glass-card">
            <div id="loginPanitia">
                <h2 style="margin-bottom:25px;">Login Panitia</h2>
                <input type="password" id="pinPass" placeholder="Masukkan PIN" class="input-box" style="text-align:center;">
                <button class="btn-action" onclick="prosesLogin()">MASUK</button>
                <button class="btn-back" onclick="backToMenu()">BATAL</button>
            </div>

            <div id="scannerSection" style="display:none;">
                <h2 style="margin-bottom:20px;">Scanner Ready</h2>
                <div id="reader"></div>
                <p id="statusScan" style="margin-top:20px; font-weight:700; font-size:1.1rem;"></p>
                <button class="btn-back" onclick="location.reload()" style="margin-top:20px;">LOGOUT</button>
            </div>
        </div>

    </div>

    <script>
        const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbwtVl3lHGkb_vb7-cQuycylVz-ClfM6Kq2Q58TBbdbClXPfKrOpWfM0Ryn0moTdqUGxCg/exec'; // GANTI DENGAN URL APPS SCRIPT
        const PIN_SECRET = "WISUDAIWU26";
        let html5QrScanner;

        // Navigasi
        function openWisudawan() {
            document.getElementById('uiMenu').style.display = 'none';
            document.getElementById('uiWisudawan').style.display = 'block';
        }
        function openPanitia() {
            document.getElementById('uiMenu').style.display = 'none';
            document.getElementById('uiPanitia').style.display = 'block';
        }
        function backToMenu() {
            location.reload();
        }

        // Fungsi Ambil Data Mahasiswa
        async function getQR() {
            const nim = document.getElementById('nimMhs').value.trim();
            if(!nim) return alert("Isi NIM dulu!");
            
            try {
                const res = await fetch(`${URL_SCRIPT}?action=getMahasiswa&nim=${nim}`);
                const d = await res.json();
                if(d.nim) {
                    document.getElementById('hasilMhs').style.display = 'block';
                    document.getElementById('detailMhs').innerHTML = `<h3>${d.nama}</h3><p>${d.prodi}</p><p>Kursi: ${d.kursi}</p>`;
                    QRCode.toCanvas(document.getElementById('canvasQR'), `MHS:${d.nim}`, { width: 220 });
                } else { alert("Data tidak ada!"); }
            } catch(e) { alert("Koneksi Error"); }
        }

        // Fungsi Login & Scanner
        function prosesLogin() {
            if(document.getElementById('pinPass').value === PIN_SECRET) {
                document.getElementById('loginPanitia').style.display = 'none';
                document.getElementById('scannerSection').style.display = 'block';
                startScan();
            } else { alert("PIN Salah!"); }
        }

        function startScan() {
            html5QrScanner = new Html5Qrcode("reader");
            html5QrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
                document.getElementById('statusScan').innerText = "Sedang diproses...";
                kirimDataScan(decodedText);
            });
        }

        async function kirimDataScan(txt) {
            try {
                const r = await fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify({action: 'scanQR', data: txt}) });
                const resJson = await r.json();
                const st = document.getElementById('statusScan');
                st.innerText = resJson.message;
                st.style.color = resJson.success ? "#00ff00" : "#ff4d4d";
            } catch(e) { }
        }
    </script>
</body>
</html>
