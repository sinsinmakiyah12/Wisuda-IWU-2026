<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Wisuda IWU 2026</title>
    <!-- Library QR, Scanner & Font -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: radial-gradient(circle at top right, #1e0b4d, #0d0421); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: white; }
        .container { width: 100%; max-width: 480px; text-align: center; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border-radius: 30px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.2); display: none; }
        .input-box { width: 100%; padding: 15px; border-radius: 12px; border: none; margin-bottom: 15px; font-size: 1rem; text-align: center; font-weight: 600; }
        select.input-box { background: #2a1b4d; color: white; border: 1px solid #6a1b9a; }
        .btn-purple { background: #6a1b9a; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-outline { background: transparent; color: white; border: 2px solid rgba(255,255,255,0.4); padding: 12px; border-radius: 12px; width: 100%; font-weight: 600; margin-top: 10px; cursor: pointer; }
        .menu-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 30px; margin-bottom: 20px; cursor: pointer; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 15px; }
        .qr-display { background: white; padding: 15px; border-radius: 15px; display: inline-block; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="mainMenu">
        <h1 style="margin-bottom: 30px;">WISUDA IWU 2026</h1>
        <div class="menu-card" onclick="showPage('viewWisudawan')">
            <i class="fas fa-user-graduate" style="font-size: 40px; color: #a286f4; margin-bottom: 10px;"></i>
            <h2>Wisudawan</h2>
            <p>Unduh QR Kehadiran</p>
        </div>
        <div class="menu-card" onclick="showPage('viewPanitia')">
            <i class="fas fa-qrcode" style="font-size: 40px; color: #a286f4; margin-bottom: 10px;"></i>
            <h2>Panitia</h2>
            <p>Scanner Kamera</p>
        </div>
    </div>

    <!-- HALAMAN WISUDAWAN -->
    <div id="viewWisudawan" class="glass-card">
        <h2>Cek Data</h2>
        <input type="text" id="nimInput" placeholder="Masukkan NIM" class="input-box">
        <button class="btn-purple" onclick="cariDataMhs()">CARI DATA</button>
        
        <div id="hasilMhs" style="display:none; margin-top:20px;">
    <div id="infoDetail" class="menu-card" style="cursor:default; background:rgba(162, 134, 244, 0.2);"></div>
    
    <p style="margin-bottom: 10px; font-weight: 600;">Pilih Kategori QR:</p>
    <!-- Kita pakai Select dulu agar simpel, atau bisa dibuat tombol grid nanti -->
    <select id="tipeQR" class="input-box" onchange="renderQR()">
        <option value="Simulasi">1. QR Simulasi</option>
        <option value="Mahasiswa">2. QR Kehadiran Hari H</option>
        <option value="Ortu">3. QR Undangan Orang Tua</option>
        <option value="Toga">4. QR Pengambilan Toga</option>
        <option value="Ijazah">5. QR Pengambilan Ijazah</option>
    </select>

    <div class="qr-display" style="border: 5px solid #6a1b9a;">
        <canvas id="qrCanvas"></canvas>
        <p id="labelQR" style="color: black; font-size: 12px; font-weight: bold; margin-top: 5px;"></p>
    </div>

    <button class="btn-purple" onclick="downloadQR()">
        <i class="fas fa-download"></i> DOWNLOAD QR
    </button>
</div>
    <!-- HALAMAN PANITIA -->
    <div id="viewPanitia" class="glass-card">
        <h2>Scanner Panitia</h2>
        <div id="loginArea">
            <input type="password" id="pinField" placeholder="Masukkan PIN" class="input-box">
            <button class="btn-purple" onclick="startCamera()">AKTIFKAN SCANNER</button>
        </div>
        <div id="scannerArea" style="display:none;">
            <div id="reader"></div>
            <button class="btn-purple" style="background:#cc0000;" onclick="location.reload()">STOP SCANNER</button>
        </div>
        <button class="btn-outline" onclick="location.reload()">KEMBALI</button>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbw1NbJf7p1zmXDPEl1hqQJ91jbHSa7tQz4KnySsHwVADdfhlUB_cj9a6C8F-Fo-RSyWLw/exec"; 
    let currentData = null;

    function showPage(id) {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    async function cariDataMhs() {
        const nim = document.getElementById('nimInput').value;
        try {
            const res = await fetch(`${URL_SCRIPT}?action=getMahasiswa&nim=${nim}`);
            const data = await res.json();
            if(data.nim) {
                currentData = data;
                document.getElementById('hasilMhs').style.display = 'block';
                document.getElementById('infoDetail').innerHTML = `<h3>${data.nama}</h3><p>Kursi: ${data.kursi}</p>`;
                renderQR();
            } else { alert("NIM Tidak Ditemukan!"); }
        } catch(e) { alert("Pastikan URL_SCRIPT sudah benar!"); }
    }

    function renderQR() {
    const tipe = document.getElementById('tipeQR').value;
    const canvas = document.getElementById('qrCanvas');
    const label = document.getElementById('labelQR');
    
    // QR mengandung data NIM dan Tipe (Contoh: 230101|Toga)
    QRCode.toCanvas(canvas, `${currentData.nim}|${tipe}`, { 
        width: 200,
        margin: 2,
        color: {
            dark: '#000000',
            light: '#ffffff'
        }
    });
    
    label.innerText = `QR ${tipe} - ${currentData.nim}`;
}

    async function downloadQR() {
        const tipe = document.getElementById('tipeQR').value;
        // Kirim update ke Spreadsheet
        fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify({ action: "logDownload", nim: currentData.nim, tipe: tipe }) });
        
        const link = document.createElement('a');
        link.download = `QR_${tipe}_${currentData.nim}.png`;
        link.href = document.getElementById('qrCanvas').toDataURL();
        link.click();
        alert("Berhasil didownload & database diperbarui!");
    }

    function startCamera() {
        const pin = document.getElementById('pinField').value;
        if(pin === "WISUDAIWU26") {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('scannerArea').style.display = 'block';
            const html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                alert("Hasil Scan: " + text);
            }).catch(err => alert("Izin kamera ditolak!"));
        } else { alert("PIN SALAH!"); }
    }
</script>
</body>
</html>
