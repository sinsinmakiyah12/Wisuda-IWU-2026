<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Wisuda IWU 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; overflow-x: hidden;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { 
            text-align: center; color: white; margin-bottom: 40px; 
            animation: fadeInDown 1s ease;
        }
        .header h1 { 
            font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .header p { font-size: 1.1rem; opacity: 0.9; }
        .role-selector { 
            display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; 
            margin-bottom: 50px;
        }
        .role-card { 
            background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; 
            padding: 40px 30px; width: 320px; text-align: center; color: white; 
            cursor: pointer; transition: all 0.4s ease; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .role-card:hover { 
            transform: translateY(-15px); background: rgba(255,255,255,0.25); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }
        .role-card.shake { animation: shake 0.5s ease-in-out; }
        .role-card i { font-size: 4rem; margin-bottom: 20px; color: #e0c3fc; }
        .role-card h3 { font-size: 1.4rem; margin-bottom: 10px; font-weight: 600; }
        .role-card p { opacity: 0.9; line-height: 1.6; }
        .mahasiswa-section, .panitia-section { display: none; animation: fadeInUp 0.8s ease; }
        .mahasiswa-section.active, .panitia-section.active { display: block; }
        .qr-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .qr-card { 
            background: rgba(255,255,255,0.95); border-radius: 20px; padding: 30px; 
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            transition: all 0.3s ease; border: 2px solid transparent;
        }
        .qr-card:hover { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(0,0,0,0.15); }
        .qr-card.downloaded { 
            border-color: #10b981; background: linear-gradient(135deg, #10b981, #059669); 
            color: white;
        }
        .qr-card h3 { font-size: 1.2rem; margin-bottom: 10px; color: #4a5568; }
        .qr-card.downloaded h3 { color: white; }
        .qr-info { font-size: 0.85rem; opacity: 0.8; margin-bottom: 15px; line-height: 1.4; }
        .qr-card.downloaded .qr-info { color: rgba(255,255,255,0.9); }
        #qrCanvas { width: 180px; height: 180px; margin: 0 auto 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .btn-download { 
            background: linear-gradient(135deg, #667eea, #764ba2); color: white; 
            border: none; padding: 12px 30px; border-radius: 50px; font-weight: 600; 
            cursor: pointer; transition: all 0.3s ease; font-size: 0.95rem;
        }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.4); }
        .btn-download:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .scan-section { 
            background: rgba(255,255,255,0.95); border-radius: 20px; padding: 40px; 
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); margin-bottom: 30px;
        }
        #video { width: 100%; max-width: 400px; height: 400px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-top: 30px; }
        .stat-card { 
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7)); 
            padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .stat-number { font-size: 1.8rem; font-weight: 700; color: #667eea; }
        .back-btn { 
            background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); 
            padding: 12px 30px; border-radius: 25px; cursor: pointer; font-family: inherit; margin-top: 20px;
            font-size: 1rem; font-weight: 500;
        }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        @media (max-width: 768px) { 
            .role-selector { flex-direction: column; align-items: center; }
            .role-card { width: 100%; max-width: 350px; }
            .header h1 { font-size: 2rem; }
            .qr-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-graduation-cap"></i> Wisuda UNP 2024</h1>
            <p>Sistem Absensi Digital & QR Code</p>
        </div>

        <div class="role-selector">
            <div class="role-card" onclick="showMahasiswa()">
                <i class="fas fa-user-graduate"></i>
                <h3>Wisudawan</h3>
                <p>Download QR Code untuk semua proses wisuda</p>
            </div>
            <div class="role-card" onclick="showPanitia()" id="panitiaCard">
                <i class="fas fa-qrcode"></i>
                <h3>Panitia</h3>
                <p>🔐 Scanner & Monitor Real-time</p>
            </div>
        </div>

        <!-- WISUDAWAN SECTION -->
        <div id="mahasiswaSection" class="mahasiswa-section">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="color: white; font-size: 2rem; margin-bottom: 10px;">
                    <i class="fas fa-user-graduate"></i> Dashboard Wisudawan
                </h2>
                <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
                    <input type="text" id="nimInput" placeholder="Masukkan NIM Anda" 
                           style="padding: 15px 25px; border: none; border-radius: 50px; font-size: 1.1rem; min-width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
                    <button onclick="loadMahasiswaData()" class="btn-download" style="padding: 15px 30px;">
                        <i class="fas fa-search"></i> Cek Data
                    </button>
                </div>
            </div>
            <div id="qrGrid" class="qr-grid" style="display: none;"></div>
            <div id="noData" style="text-align: center; color: white; font-size: 1.2rem; display: none;">
                <i class="fas fa-exclamation-triangle"></i><br>NIM tidak ditemukan
            </div>
            <button class="back-btn" onclick="showLanding()" style="display: none;" id="backBtn">
                <i class="fas fa-arrow-left"></i> Kembali ke Menu
            </button>
        </div>

        <!-- PANITIA SECTION -->
        <div id="panitiaSection" class="panitia-section">
            <div class="scan-section">
                <h2 style="color: #4a5568; margin-bottom: 20px;">
                    <i class="fas fa-qrcode"></i> Scanner Panitia Wisuda
                </h2>
                <video id="video" autoplay playsinline></video>
                <button id="scanBtn" class="btn-download" style="padding: 15px 40px; font-size: 1.1rem; margin: 20px 0;">
                    <i class="fas fa-camera"></i> Mulai Scan QR
                </button>
                <div id="scanResult" style="margin-top: 20px; font-size: 1.2rem; min-height: 40px;"></div>
            </div>
            <div class="stats-grid" id="statsGrid" style="display: none;">
                <!-- Stats akan dimuat otomatis -->
            </div>
            <button class="back-btn" onclick="showLanding()">
                <i class="fas fa-arrow-left"></i> Kembali ke Menu
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        let currentRole = ''; let mahasiswaData = {}; let html5QrCode;
        const PANITIA_PIN = 'WISUDA24'; // 🔐 GANTI PIN INI!
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxcrXUslNSVlgB0gKjbCL_6ZgliCuhDPa1eUXIddF0nEaRUtOCptO-M0YnjyjCoFIw25A/exec'; // GANTI INI!

        function showMahasiswa() {
            document.querySelector('.role-selector').style.display = 'none';
            document.getElementById('mahasiswaSection').classList.add('active');
            currentRole = 'mahasiswa';
        }

        function showPanitia() {
            const pin = prompt('🔐 Masukkan PIN Panitia (diberikan koordinator):', '');
            if (!pin || pin !== PANITIA_PIN) {
                const card = document.getElementById('panitiaCard');
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 500);
                alert('❌ PIN Salah! Hanya Panitia resmi yang bisa akses.');
                return;
            }
            document.querySelector('.role-selector').style.display = 'none';
            document.getElementById('panitiaSection').classList.add('active');
            currentRole = 'panitia';
            initScanner();
        }

        function showLanding() {
            document.querySelector('.role-selector').style.display = 'flex';
            document.getElementById('mahasiswaSection').classList.remove('active');
            document.getElementById('panitiaSection').classList.remove('active');
            document.getElementById('qrGrid').style.display = 'none';
            document.getElementById('noData').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('statsGrid').style.display = 'none';
            currentRole = '';
            if (html5QrCode) html5QrCode.stop();
        }

        async function loadMahasiswaData() {
            const nim = document.getElementById('nimInput').value.trim();
            if (!nim) { alert('⭕ Masukkan NIM terlebih dahulu!'); return; }
            
            document.getElementById('qrGrid').style.display = 'none';
            document.getElementById('noData').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=getMahasiswa&nim=${nim}`);
                mahasiswaData = await response.json();
                if (mahasiswaData.nim) {
                    displayQRCodes();
                    document.getElementById('backBtn').style.display = 'inline-block';
                } else {
                    document.getElementById('noData').style.display = 'block';
                    document.getElementById('backBtn').style.display = 'inline-block';
                }
            } catch (error) { 
                alert('❌ Error koneksi: ' + error.message); 
            }
        }

        function displayQRCodes() {
            const qrGrid = document.getElementById('qrGrid');
            const types = [
                { id: 'simulasi', name: 'Simulasi Wisuda', icon: '🎉', status: 'simulasi' },
                { id: 'kehadiran_ortu', name: 'Kehadiran OrtU', icon: '👨‍👩‍👧', status: 'kehadiran_ortu' },
                { id: 'kehadiran_mhs', name: 'Kehadiran Mahasiswa', icon: '✅', status: 'kehadiran_mhs' },
                { id: 'toga', name: 'Status Toga', icon: '🎓', status: 'status_toga' },
                { id: 'ijazah', name: 'Status Ijazah', icon: '📜', status: 'status_ijazah' }
            ];
            
            qrGrid.innerHTML = types.map(type => `
                <div class="qr-card ${mahasiswaData.status_download === 'Sudah Download' ? 'downloaded' : ''}">
                    <h3>${type.icon} ${type.name}</h3>
                    <div class="qr-info">
                        <strong>${mahasiswaData.nama}</strong><br>
                        ${mahasiswaData.prodi} - ${mahasiswaData.fakultas}<br>
                        ${mahasiswaData.ortu1} ${mahasiswaData.ortu2}<br>
                        <strong>Kursi: ${mahasiswaData.kursi}</strong>
                    </div>
                    <canvas id="qr_${type.id}" ${mahasiswaData.status_download === 'Sudah Download' ? 'style="opacity:0.5"' : ''}></canvas>
                    <br>
                    <button class="btn-download" onclick="downloadQR('${type.id}')" 
                            ${mahasiswaData.status_download === 'Sudah Download' ? 'disabled' : ''}>
                        ${mahasiswaData.status_download === 'Sudah Download' ? '✅ Sudah Download Semua QR' : '📥 Download QR ' + type.name}
                    </button>
                </div>
            `).join('');
            
            qrGrid.style.display = 'grid';
            
            // Generate semua QR jika belum download
            if (mahasiswaData.status_download !== 'Sudah Download') {
                types.forEach(type => generateQR(`MHS:${mahasiswaData.nim}:${type.id}`, `qr_${type.id}`));
            }
        }

        function generateQR(text, canvasId) {
            QRCode.toCanvas(document.getElementById(canvasId), text, {
                width: 180, margin: 2, color: { dark: '#1a202c', light: '#ffffff' }
            });
        }

        async function downloadQR(type) {
            const canvas = document.getElementById(`qr_${type}`);
            const link = document.createElement('a');
            link.download = `QR_${mahasiswaData.nama.replace(/\s+/g, '_')}_${type}.png`;
            link.href = canvas.toDataURL();
            link.click();
            
            // Mark all as downloaded
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST', 
                    body: JSON.stringify({ action: 'markDownloaded', nim: mahasiswaData.nim })
                });
                alert('✅ QR berhasil diunduh! Status updated di database.');
                loadMahasiswaData();
            } catch (error) {
                alert('✅ QR berhasil diunduh! (Update database gagal)');
            }
        }

        // PANITIA SCANNER
        async function initScanner() {
            html5QrCode = new Html5Qrcode("video");
            document.getElementById('scanBtn').onclick = () => {
                html5QrCode.start(
                    { facingMode: "environment" }, 
                    handleScan, 
                    (error) => console.log('Camera error:', error)
                ).catch(err => alert('Gagal start camera: ' + err));
            };
            updateStats();
        }

        async function handleScan(decodedText) {
            const resultDiv = document.getElementById('scanResult');
            resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses scan...';
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST', 
                    body: JSON.stringify({ action: 'scanQR', data: decodedText })
                });
                const result = await response.json();
                showScanResult(result);
                updateStats();
            } catch (error) {
                resultDiv.innerHTML = '<i class="fas fa-times-circle" style="color:#ef4444;"></i> Error: ' + error.message;
            }
        }

        function showScanResult(result) {
            const resultDiv = document.getElementById('scanResult');
            if (result.success) {
                resultDiv.innerHTML = `<div style="color: #10b981; font-weight: 600; font-size: 1.1rem;">
                    <i class="fas fa-check-circle"></i> ${result.message}
                </div>`;
                resultDiv.style.background = 'rgba(16,185,129,0.1)';
                resultDiv.style.padding = '15px';
                resultDiv.style.borderRadius = '10px';
                resultDiv.style.border = '2px solid #10b981';
            } else {
                resultDiv.innerHTML = `<div style="color: #ef4444; font-weight: 600; font-size: 1.1rem;">
                    <i class="fas fa-times-circle"></i> ${result.message}
                </div>`;
                resultDiv.style.background = 'rgba(239,68,68,0.1)';
                resultDiv.style.padding = '15px';
                resultDiv.style.borderRadius = '10px';
                resultDiv.style.border = '2px solid #ef4444';
            }
        }

        async function updateStats() {
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=getStats`);
                const stats = await response.json();
                const statsGrid = document.getElementById('statsGrid');
                statsGrid.innerHTML = `
                    <div class="stat-card"><div class="stat-number">${stats.simulasi}</div><div>Simulasi</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.ortu}</div><div>Kehadiran OrtU</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.mhs}</div><div>Kehadiran Mhs</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.toga}</div><div>Toga Diambil</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.ijazah}</div><div>Ijazah Diambil</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.download}</div><div>QR Download</div></div>
                `;
                statsGrid.style.display = 'grid';
            } catch (e) { console.log('Stats update error:', e); }
        }

        // Enter key support
        document.getElementById('nimInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loadMahasiswaData();
        });
    </script>
</body>
</html>
